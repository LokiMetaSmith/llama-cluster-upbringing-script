- name: Create OpenClaw directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ target_user | default('root') }}"
    group: "{{ target_user | default('root') }}"
  loop:
    - /opt/openclaw
    - /opt/openclaw/config
    - /opt/openclaw/data
    - /opt/openclaw/skills/pipecat
    - /opt/openclaw/docker

- name: Copy OpenClaw Dockerfile
  ansible.builtin.copy:
    src: Dockerfile
    dest: /opt/openclaw/docker/Dockerfile
    mode: '0644'
    owner: "{{ target_user | default('root') }}"
    group: "{{ target_user | default('root') }}"

- name: Build OpenClaw Docker image
  community.docker.docker_image:
    name: openclaw
    tag: latest
    source: build
    build:
      path: /opt/openclaw/docker
      pull: true
    force_source: true

- name: Export openclaw image to tarball
  ansible.builtin.command: docker save -o /tmp/openclaw.tar openclaw:latest
  become: yes

- name: Pin openclaw tarball to IPFS
  ansible.builtin.command: ipfs add -Q /tmp/openclaw.tar
  become: yes
  register: ipfs_add_result_openclaw
  environment:
    IPFS_PATH: "{{ nomad_volumes_dir | default('/opt/cluster-infra/data') }}/ipfs"

- name: Clean up temporary openclaw tarball
  ansible.builtin.file:
    path: /tmp/openclaw.tar
    state: absent
  become: yes

- name: Set openclaw_ipfs_cid fact
  ansible.builtin.set_fact:
    openclaw_ipfs_cid: "{{ ipfs_add_result_openclaw.stdout }}"

- name: Copy Pipecat Skill
  ansible.builtin.copy:
    src: pipecat_skill.md
    dest: /opt/openclaw/skills/pipecat/SKILL.md
    mode: '0644'
    owner: "{{ target_user | default('root') }}"
    group: "{{ target_user | default('root') }}"

- name: Template OpenClaw Nomad job file
  ansible.builtin.template:
    src: openclaw.nomad.j2
    dest: "{{ nomad_jobs_dir | default('/opt/nomad/jobs') }}/openclaw.nomad"
    mode: '0644'

- name: Run OpenClaw Nomad job
  ansible.builtin.command:
    cmd: "/usr/local/bin/nomad job run -detach {{ nomad_jobs_dir | default('/opt/nomad/jobs') }}/openclaw.nomad"
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  register: openclaw_job_run
  changed_when: true
