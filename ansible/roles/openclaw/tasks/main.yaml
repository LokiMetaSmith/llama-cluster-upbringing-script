- name: Check if Nomad CLI cert exists
  ansible.builtin.stat:
    path: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem' }}"
  register: nomad_cli_cert_stat

- name: Set nomad_protocol fact
  ansible.builtin.set_fact:
    nomad_protocol: "{{ \"https\" if nomad_cli_cert_stat.stat.exists else \"http\" }}"

- name: Create OpenClaw directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ target_user | default('root') }}"
    group: "{{ target_user | default('root') }}"
  loop:
    - /opt/openclaw
    - /opt/openclaw/config
    - /opt/openclaw/data
    - /opt/openclaw/skills/pipecat
    - /opt/openclaw/docker

- name: Copy OpenClaw Dockerfile
  ansible.builtin.copy:
    src: Dockerfile
    dest: /opt/openclaw/docker/Dockerfile
    mode: '0644'
    owner: "{{ target_user | default('root') }}"
    group: "{{ target_user | default('root') }}"

- name: Build OpenClaw Docker image
  ansible.builtin.command: docker build -t openclaw:latest .
  args:
    chdir: /opt/openclaw/docker
  changed_when: true

- name: Export openclaw image to tarball
  ansible.builtin.command: docker save -o /opt/openclaw.tar openclaw:latest
  become: yes

- name: Pin openclaw tarball to IPFS
  ansible.builtin.command: ipfs add -Q /opt/openclaw.tar
  become: yes
  register: ipfs_add_result_openclaw
  environment:
    IPFS_PATH: "{{ unified_fs_mount_point | default('/opt/unified_fs') }}/ipfs"
- name: Clean up temporary openclaw tarball
  ansible.builtin.file:
    path: /opt/openclaw.tar
    state: absent
  become: yes

- name: Set openclaw_ipfs_cid fact
  ansible.builtin.set_fact:
    openclaw_ipfs_cid: "{{ ipfs_add_result_openclaw.stdout }}"

- name: Copy Pipecat Skill
  ansible.builtin.copy:
    src: pipecat_skill.md
    dest: /opt/openclaw/skills/pipecat/SKILL.md
    mode: '0644'
    owner: "{{ target_user | default('root') }}"
    group: "{{ target_user | default('root') }}"

- name: Template OpenClaw Nomad job file
  ansible.builtin.template:
    src: openclaw.nomad.j2
    dest: "{{ nomad_jobs_dir | default('/opt/nomad/jobs') }}/openclaw.nomad"
    mode: '0644'

- name: Run OpenClaw Nomad job
  ansible.builtin.command:
    cmd: "/usr/local/bin/nomad job run -detach {{ nomad_jobs_dir | default('/opt/nomad/jobs') }}/openclaw.nomad"
  environment:
    NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
  register: openclaw_job_run
  changed_when: true
