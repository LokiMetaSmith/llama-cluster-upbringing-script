# tasks/main.yaml

- name: Create build directory
  ansible.builtin.file:
    path: "{{ semantic_router_build_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Template Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ semantic_router_build_dir }}/Dockerfile"
    mode: '0644'
  become: yes
  register: dockerfile_status

- name: Get checksum of all files in semantic_router build directory
  ansible.builtin.find:
    paths: "{{ semantic_router_build_dir }}"
    recurse: yes
    get_checksum: yes
    checksum_algorithm: sha256
  register: build_files
  become: yes

- name: Generate build configuration hash
  ansible.builtin.set_fact:
    build_hash: >-
      {{
        build_files.files
        | sort(attribute='path')
        | map(attribute='path')
        | zip(build_files.files | sort(attribute='path') | map(attribute='checksum'))
        | map('join', ':')
        | join(',')
        | hash('sha256')
      }}

- name: Extract base image name
  ansible.builtin.set_fact:
    base_image_name: "{{ semantic_router_image_name | split(':') | first }}"

- name: Set versioned tag
  ansible.builtin.set_fact:
    versioned_tag: "v-{{ build_hash }}"

- name: Check if versioned image exists locally
  ansible.builtin.command: "docker image inspect {{ base_image_name }}:{{ versioned_tag }}"
  register: versioned_image_check
  failed_when: false
  changed_when: false
  become: yes

- name: Build Semantic Router Docker Image
  ansible.builtin.command:
    cmd: "docker build -t {{ base_image_name }}:{{ versioned_tag }} ."
    chdir: "{{ semantic_router_build_dir }}"
  become: yes
  when: dockerfile_status.changed or force_rebuild | default(false) or versioned_image_check.rc != 0

- name: Tag image with target tag
  ansible.builtin.command: "docker tag {{ base_image_name }}:{{ versioned_tag }} {{ semantic_router_image_name }}"
  become: yes

- name: Ensure Nomad jobs directory exists
  ansible.builtin.file:
    path: "{{ nomad_jobs_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Template Semantic Router Nomad job
  ansible.builtin.template:
    src: semantic-router.nomad.j2
    dest: "{{ nomad_jobs_dir }}/semantic-router.nomad"
    mode: '0644'
  become: yes
  register: job_template

- name: Run Semantic Router Nomad job
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach "{{ nomad_jobs_dir }}/semantic-router.nomad"
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  register: nomad_job_run_result
  changed_when: "'Job registration successful' in nomad_job_run_result.stdout"
  failed_when: nomad_job_run_result.rc != 0 and 'Job registration successful' not in nomad_job_run_result.stdout
  become: yes
