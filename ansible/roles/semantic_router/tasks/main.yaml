# tasks/main.yaml

- name: Create build directory
  ansible.builtin.file:
    path: "{{ semantic_router_build_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Template Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ semantic_router_build_dir }}/Dockerfile"
    mode: '0644'
  become: yes
  register: dockerfile_status

- name: Extract base image name
  ansible.builtin.set_fact:
    _semantic_router_base_image: "{{ semantic_router_image_name | regex_replace(':[^/:]+$', '') }}"

- name: Extract tag name
  ansible.builtin.set_fact:
    _semantic_router_tag: "{{ semantic_router_image_name | regex_search('(?<=:)[^/:]+$') | default('latest', true) }}"

- name: Build Semantic Router Docker Image (cached)
  ansible.builtin.include_tasks:
    file: "../../tasks/build_cached_image.yaml"
  vars:
    build_dir: "{{ semantic_router_build_dir }}"
    image_name: "{{ _semantic_router_base_image }}"
    image_tag: "{{ _semantic_router_tag }}"

- name: Ensure Nomad jobs directory exists
  ansible.builtin.file:
    path: "{{ nomad_jobs_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Template Semantic Router Nomad job
  ansible.builtin.template:
    src: semantic-router.nomad.j2
    dest: "{{ nomad_jobs_dir }}/semantic-router.nomad"
    mode: '0644'
  become: yes
  register: job_template

- name: Run Semantic Router Nomad job
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach "{{ nomad_jobs_dir }}/semantic-router.nomad"
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  register: nomad_job_run_result
  changed_when: "'Job registration successful' in nomad_job_run_result.stdout"
  failed_when: nomad_job_run_result.rc != 0 and 'Job registration successful' not in nomad_job_run_result.stdout
  become: yes
