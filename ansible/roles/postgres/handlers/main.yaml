- name: Run Postgres job
  community.general.nomad_job:
    host: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    use_ssl: "{{ nomad_cli_cert_stat.stat.exists if nomad_cli_cert_stat is defined else (nomad_protocol == 'https') }}"
    client_cert: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if (nomad_cli_cert_stat.stat.exists if nomad_cli_cert_stat is defined else True) else omit }}"
    client_key: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if (nomad_cli_cert_stat.stat.exists if nomad_cli_cert_stat is defined else True) else omit }}"
    ca_cert: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if (nomad_cli_cert_stat.stat.exists if nomad_cli_cert_stat is defined else True) else omit }}"
    state: present
    name: postgres
    timeout: 120
