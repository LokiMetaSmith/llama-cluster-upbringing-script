- name: Install unzip
  apt:
    name: unzip
    state: present
  become: yes

- name: Remove Consul binary from /usr/local/bin
  file:
    path: /usr/local/bin/consul
    state: absent
  become: yes

- name: Remove temporary Consul unarchive directory
  file:
    path: /tmp/consul
    state: absent
  become: yes

- name: Remove existing Consul zip file
  file:
    path: /tmp/consul.zip
    state: absent
  become: yes

- name: Download Consul
  command: "curl -L -o /tmp/consul.zip {{ consul_zip_url }}"
  check_mode: no

- name: Unzip Consul
  unarchive:
    src: "/tmp/consul.zip"
    dest: "/tmp"
    remote_src: yes
  become: yes
  check_mode: no

- name: Move Consul to /usr/local/bin
  copy:
    src: /tmp/consul
    dest: /usr/local/bin/consul
    remote_src: yes
    mode: '0755'
  become: yes

- name: Verify Consul binary existence
  stat:
    path: /usr/local/bin/consul
  register: consul_binary_stat

- name: Debug Consul binary existence
  debug:
    msg: "Consul binary exists at /usr/local/bin/consul: {{ consul_binary_stat.stat.exists }}"

- name: Remove Consul data directory (for clean restart)
  file:
    path: "{{ consul_data_dir }}"
    state: absent
  become: yes

- name: Create Consul data directory
  file:
    path: "{{ consul_data_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Create Consul config directory
  file:
    path: "{{ consul_config_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Copy Consul config
  template:
    src: consul.hcl.j2
    dest: "{{ consul_config_dir }}/consul.hcl"
  notify: restart consul
  become: yes

- name: Copy Consul systemd service file
  template:
    src: consul.service.j2
    dest: /etc/systemd/system/consul.service
  notify: restart consul
  become: yes

- name: Reload systemd to recognize new service
  systemd:
    daemon_reload: yes
  become: yes
  when: not ansible_check_mode

- name: Start and enable Consul service
  systemd:
    name: consul
    state: started
    enabled: yes
  become: yes
  when: not ansible_check_mode

- name: Force restart Consul service to apply all changes
  systemd:
    name: consul
    state: restarted
  become: yes
  when: not ansible_check_mode
