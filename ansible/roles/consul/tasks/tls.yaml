- name: Check if CA certificate exists (localhost)
  stat:
    path: "{{ consul_temp_cert_dir }}/ca.pem"
  register: ca_cert_stat
  delegate_to: localhost
  check_mode: false

- name: Check if existing Consul CA certificate on target node is compliant
  become: yes
  ansible.builtin.shell: |
    set -e
    if [ ! -f "{{ consul_config_dir }}/ca.pem" ]; then
      exit 1
    fi
    openssl x509 -in "{{ consul_config_dir }}/ca.pem" -text -noout | grep -q "CA:TRUE"
    openssl x509 -in "{{ consul_config_dir }}/ca.pem" -text -noout | grep -E -q "X509v3 Key Usage|keyUsage"
    openssl x509 -in "{{ consul_config_dir }}/ca.pem" -text -noout | grep -E -q "Certificate Sign|keyCertSign"
  register: target_consul_ca_validity
  failed_when: false
  changed_when: false

- name: Automate Consul Purge Sequence if CA is flawed
  block:
    - name: Stop Consul and Nomad services
      become: yes
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - consul
        - nomad
      failed_when: false

    - name: Force kill Consul and Nomad processes
      become: yes
      ansible.builtin.command: pkill -9 -f "consul|nomad"
      ignore_errors: yes
      failed_when: false

    - name: Wipe all certificates and trust store entries
      become: yes
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ consul_config_dir }}/ca.pem"
        - "{{ consul_config_dir }}/cert.pem"
        - "{{ consul_config_dir }}/key.pem"
        - "/etc/consul.d/tls/ca.pem"
        - "/etc/consul.d/tls/cert.pem"
        - "/etc/consul.d/tls/key.pem"
        - "/usr/local/share/ca-certificates/consul-ca.crt"

    - name: Rebuild system trust store cleanly (fresh)
      become: yes
      ansible.builtin.command: /usr/sbin/update-ca-certificates --fresh
      changed_when: true
      failed_when: false
  when: target_consul_ca_validity is defined and target_consul_ca_validity.rc != 0

- name: Force clear existing certificates on target nodes to trigger rotation
  become: yes
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ consul_config_dir }}/ca.pem"
    - "{{ consul_config_dir }}/cert.pem"
    - "{{ consul_config_dir }}/key.pem"
    - "/usr/local/share/ca-certificates/consul-ca.crt"
  when: not ansible_check_mode or ca_cert_stat.stat.exists or (target_consul_ca_validity is defined and target_consul_ca_validity.rc != 0)

- name: Update system trust store after clearing
  become: yes
  ansible.builtin.command: /usr/sbin/update-ca-certificates --force
  changed_when: true
  failed_when: false
  when: not ansible_check_mode or ca_cert_stat.stat.exists

- name: Copy CA certificate to all nodes
  copy:
    src: "{{ consul_temp_cert_dir }}/ca.pem"
    dest: "{{ consul_config_dir }}/ca.pem"
    mode: '0644'
    owner: consul
    group: consul
    remote_src: no
  become: yes
  when: not ansible_check_mode or ca_cert_stat.stat.exists
  notify: Restart Consul

- name: Copy Consul CA certificate to system-wide trusted CA location
  become: yes
  ansible.builtin.copy:
    src: "{{ consul_temp_cert_dir }}/ca.pem"
    dest: "/usr/local/share/ca-certificates/consul-ca.crt"
    mode: '0644'
    owner: root
    group: root
    remote_src: no
  when: not ansible_check_mode or ca_cert_stat.stat.exists

- name: Rebuild system trust store with newly minted CA
  become: yes
  ansible.builtin.command: /usr/sbin/update-ca-certificates --force
  changed_when: true
  failed_when: false
  when: not ansible_check_mode or ca_cert_stat.stat.exists

- name: Copy node certificate and key to each node
  copy:
    src: "{{ consul_temp_cert_dir }}/{{ inventory_hostname }}.{{ item.src }}"
    dest: "{{ consul_config_dir }}/{{ item.dest }}"
    mode: '0600'
    owner: consul
    group: consul
    remote_src: no
  loop:
    - { src: 'pem', dest: 'cert.pem' }
    - { src: 'key', dest: 'key.pem' }
  become: yes
  when: not ansible_check_mode or ca_cert_stat.stat.exists
  notify: Restart Consul
