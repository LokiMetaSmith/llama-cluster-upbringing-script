---
- name: Ensure Nomad jobs directory exists
  ansible.builtin.file:
    path: "{{ nomad_jobs_dir }}"
    state: directory
    mode: '0755'

- name: Create OpenGravity Docker build context directory
  ansible.builtin.file:
    path: "/opt/opengravity-build"
    state: directory
    mode: '0755'

- name: Sync OpenGravity files to build context
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../pipecatapp/ui/opengravity/"
    dest: "/opt/opengravity-build/"
    mode: '0644'
    directory_mode: '0755'

- name: Copy Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "/opt/opengravity-build/Dockerfile"
    mode: '0644'

- name: Copy Nginx config
  ansible.builtin.template:
    src: default.conf.j2
    dest: "/opt/opengravity-build/default.conf"
    mode: '0644'

- name: Build OpenGravity custom Docker image
  vars:
    image_name: opengravity
    build_dir: "/opt/opengravity-build"
  ansible.builtin.include_tasks:
    file: "../../tasks/build_cached_image.yaml"

- name: Create OpenGravity job file
  ansible.builtin.template:
    src: opengravity.nomad.j2
    dest: "{{ nomad_jobs_dir }}/opengravity.nomad"
    owner: "{{ target_user | default('pipecatapp') }}"
    group: "{{ target_user | default('pipecatapp') }}"
    mode: '0644'
  register: opengravity_job_file

- name: Submit OpenGravity job
  ansible.builtin.command:
    cmd: "nomad job run -detach {{ nomad_jobs_dir }}/opengravity.nomad"
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:4646"
    NOMAD_CACERT: "{{ nomad_tls_dir }}/ca.pem"
    NOMAD_CLIENT_CERT: "{{ nomad_tls_dir }}/cli.cert.pem"
    NOMAD_CLIENT_KEY: "{{ nomad_tls_dir }}/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  when: opengravity_job_file.changed or image_changed | default(false)
