- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes
  register: apt_update_result
  until: apt_update_result is success
  retries: 5
  delay: 10

- name: Install all system dependencies
  apt:
    name:
      - acl
      - avahi-daemon
      - build-essential
      - chrony
      - cmake
      - cmatrix
      - curl
      - expect
      - ffmpeg
      - figlet
      - fio
      - fortune-mod
      - fuse-overlayfs
      - git
      - gstreamer1.0-libav
      - hollywood
      - htop
      - iperf3
      - jq
      - libavcodec-dev
      - libavdevice-dev
      - libavfilter-dev
      - libavformat-dev
      - libavif16
      - libavutil-dev
      - libcurl4-openssl-dev
      - libevent-2.1-7t64
      - libflite1
      - libgl1
      - libglib2.0-0t64
      - libgstreamer-plugins-bad1.0-0
      - libmecab-dev
      - libnss-mdns
      - libswresample-dev
      - libswscale-dev
      - libtpm2-pkcs11-1
      - libtpm2-pkcs11-tools
      - lolcat
      - make
      - mecab
      - mecab-ipadic-utf8
      - mosh
      - ncdu
      - nfs-common
      - opensc
      - openssh-server
      - pkg-config
      - portaudio19-dev
      - python3
      - python3-dev
      - python3-full
      - python3-pip
      - python3-venv
      - python3-virtualenv
      - rsync
      - sl
      - sshpass
      - sysbench
      - tmux
      - toilet
      - tpm2-abrmd
      - tpm2-tools
      - ufw
      - unzip
      - yq
    state: present
  become: yes
  check_mode: no

- name: Ensure avahi-daemon is started and enabled
  ansible.builtin.service:
    name: avahi-daemon
    state: started
    enabled: yes
  become: yes

- name: Check if Cargo is installed
  ansible.builtin.stat:
    path: /root/.cargo/bin/cargo
  register: cargo_stat

- name: Install Rust and Cargo via rustup
  ansible.builtin.shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  when: not cargo_stat.stat.exists
  become: yes

- name: Add cargo to PATH for all users
  ansible.builtin.copy:
    dest: /etc/profile.d/rust.sh
    content: |
      export PATH="/root/.cargo/bin:$PATH"
    mode: '0644'
  become: yes

- name: Create symlinks for cargo and rustc
  ansible.builtin.file:
    src: "/root/.cargo/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - cargo
    - rustc
  become: yes
