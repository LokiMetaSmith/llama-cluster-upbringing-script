- name: Ensure Exo directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ exo_data_dir }}"
    - "{{ exo_home_dir }}"
  become: yes
  when: exo_enable

- name: Create build directory for Exo
  ansible.builtin.file:
    path: /opt/exo_build
    state: directory
    mode: '0755'
  become: yes
  when: exo_enable

- name: Copy Dockerfile to build directory
  ansible.builtin.copy:
    src: "{{ role_path }}/files/Dockerfile"
    dest: /opt/exo_build/Dockerfile
    mode: '0644'
  become: yes
  when: exo_enable

- name: Build Exo Docker image
  become: yes
  community.docker.docker_image:
    name: "{{ exo_docker_image_name }}"
    build:
      path: /opt/exo_build
      args:
        EXO_REPO_URL: "{{ exo_repo_url }}"
        EXO_VERSION: "{{ exo_version }}"
    source: build
    force_source: true # Ensure we rebuild if files change
  when: exo_enable

- name: Export Exo image to tarball
  ansible.builtin.command: docker save -o /opt/{{ exo_docker_image_name }}.tar {{ exo_docker_image_name }}:latest
  become: yes
  when: exo_enable

- name: Pin Exo tarball to IPFS
  ansible.builtin.command: ipfs add -Q /opt/{{ exo_docker_image_name }}.tar
  become: yes
  register: ipfs_add_result_exo
  environment:
    IPFS_PATH: "{{ unified_fs_mount_point | default('/opt/unified_fs') }}/ipfs"
  when: exo_enable

- name: Clean up temporary Exo tarball
  ansible.builtin.file:
    path: /opt/{{ exo_docker_image_name }}.tar
    state: absent
  become: yes
  when: exo_enable

- name: Set exo_ipfs_cid fact
  ansible.builtin.set_fact:
    exo_ipfs_cid: "{{ ipfs_add_result_exo.stdout }}"
  when: exo_enable

- name: Cleanup build directory
  ansible.builtin.file:
    path: /opt/exo_build
    state: absent
  become: yes
  when: exo_enable

- name: Create Nomad jobs directory
  ansible.builtin.file:
    path: "{{ nomad_jobs_dir }}"
    state: directory
    mode: '0755'
  become: yes
  when: exo_enable

- name: Template Exo Nomad job
  ansible.builtin.template:
    src: exo.nomad.j2
    dest: "{{ nomad_jobs_dir }}/exo.nomad"
    mode: '0644'
  become: yes
  when: exo_enable

- name: Run Exo Nomad job
  ansible.builtin.command:
    cmd: "/usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/exo.nomad"
  environment:
    NOMAD_ADDR: "https://{{ advertise_ip }}:{{ nomad_http_port }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  register: exo_job_run
  changed_when: "'Eval ID' in exo_job_run.stdout"
  when: exo_enable
