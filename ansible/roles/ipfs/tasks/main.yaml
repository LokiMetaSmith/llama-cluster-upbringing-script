# Ensure IPFS CLI is installed
- name: Check if Nomad CLI cert exists
  ansible.builtin.stat:
    path: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem' }}"
  register: nomad_cli_cert_stat

- name: Set nomad_protocol fact
  ansible.builtin.set_fact:
    nomad_protocol: "{{ \"https\" if nomad_cli_cert_stat.stat.exists else \"http\" }}"

- name: Check if IPFS CLI is installed
  ansible.builtin.stat:
    path: /usr/local/bin/ipfs
  register: ipfs_binary

- name: Check IPFS version if installed
  ansible.builtin.command: /usr/local/bin/ipfs --version
  register: ipfs_version
  changed_when: false
  failed_when: false
  when: ipfs_binary.stat.exists

- name: Install IPFS CLI
  block:
    - name: Download kubo (IPFS CLI)
      ansible.builtin.get_url:
        url: "https://dist.ipfs.tech/kubo/v0.41.0/kubo_v0.41.0_linux-amd64.tar.gz"
        dest: "/tmp/kubo.tar.gz"
        mode: '0644'

    - name: Extract kubo
      ansible.builtin.unarchive:
        src: "/tmp/kubo.tar.gz"
        dest: "/tmp/"
        remote_src: yes

    - name: Move ipfs binary to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/kubo/ipfs"
        dest: "/usr/local/bin/ipfs"
        mode: '0755'
        remote_src: yes

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/kubo.tar.gz"
        - "/tmp/kubo"
  become: yes
  when: not ipfs_binary.stat.exists or (ipfs_version is defined and ipfs_version.stdout is defined and '0.41.0' not in ipfs_version.stdout)


- name: Ensure IPFS data directory exists
  ansible.builtin.file:
    path: "{{ unified_fs_mount_point | default('/opt/unified_fs') }}/ipfs"
    state: directory
    mode: '0755'
  become: yes

- name: Template ipfs job
  ansible.builtin.template:
    src: ipfs.nomad.j2
    dest: "{{ nomad_jobs_dir }}/ipfs.nomad"
  become: yes

- name: Ensure ipfs kubo image is pulled
  ansible.builtin.command: docker pull ipfs/kubo:latest
  become: yes
  register: docker_pull
  changed_when: "'Downloaded newer image' in docker_pull.stdout"

- name: Run ipfs job
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/ipfs.nomad
  environment:
    NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
  register: nomad_job_run

- name: Allow IPFS ports in UFW
  ansible.builtin.command: ufw allow {{ item }}/tcp
  loop:
    - "{{ ipfs_swarm_port | default(4001) }}"
    - "{{ ipfs_api_port | default(5001) }}"
    - "{{ ipfs_gateway_port | default(8080) }}"
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Wait for IPFS API to be ready
  ansible.builtin.wait_for:
    host: "{{ cluster_ip | default('127.0.0.1') }}"
    port: "{{ ipfs_api_port | default(5001) }}"
    delay: 5
    timeout: 300
    state: started
