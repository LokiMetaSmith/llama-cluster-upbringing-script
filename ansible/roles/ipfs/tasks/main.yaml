# Ensure IPFS CLI is installed
- name: Check if IPFS CLI is installed
  ansible.builtin.stat:
    path: /usr/local/bin/ipfs
  register: ipfs_binary

- name: Check IPFS version if installed
  ansible.builtin.command: /usr/local/bin/ipfs --version
  register: ipfs_version
  changed_when: false
  failed_when: false
  when: ipfs_binary.stat.exists

- name: Install IPFS CLI
  block:
    - name: Download kubo (IPFS CLI)
      ansible.builtin.get_url:
        url: "https://dist.ipfs.tech/kubo/v0.41.0/kubo_v0.41.0_linux-amd64.tar.gz"
        dest: "/tmp/kubo.tar.gz"
        mode: '0644'

    - name: Extract kubo
      ansible.builtin.unarchive:
        src: "/tmp/kubo.tar.gz"
        dest: "/tmp/"
        remote_src: yes

    - name: Move ipfs binary to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/kubo/ipfs"
        dest: "/usr/local/bin/ipfs"
        mode: '0755'
        remote_src: yes

    - name: Clean up temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/kubo.tar.gz"
        - "/tmp/kubo"
  become: yes
  when: not ipfs_binary.stat.exists or (ipfs_version is defined and ipfs_version.stdout is defined and '0.41.0' not in ipfs_version.stdout)


- name: Ensure mdadm is installed for RAID support
  ansible.builtin.apt:
    name: mdadm
    state: present
  become: yes
  when: ipfs_raid_devices is defined and ipfs_raid_devices | length >= 3

- name: Create RAID 5 array for IPFS storage
  community.general.mdadm:
    name: /dev/md0
    devices: "{{ ipfs_raid_devices }}"
    level: 5
    state: present
  become: yes
  when: ipfs_raid_devices is defined and ipfs_raid_devices | length >= 3

- name: Format RAID 5 array
  ansible.builtin.filesystem:
    fstype: ext4
    dev: /dev/md0
  become: yes
  when: ipfs_raid_devices is defined and ipfs_raid_devices | length >= 3

- name: Mount RAID 5 array to IPFS volume directory
  ansible.posix.mount:
    path: "{{ nomad_volumes_dir }}/ipfs"
    src: /dev/md0
    fstype: ext4
    state: mounted
  become: yes
  when: ipfs_raid_devices is defined and ipfs_raid_devices | length >= 3

- name: Ensure IPFS data directory exists
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}/ipfs"
    state: directory
    mode: '0755'
  become: yes

- name: Template ipfs job
  ansible.builtin.template:
    src: ipfs.nomad.j2
    dest: "{{ nomad_jobs_dir }}/ipfs.nomad"
  become: yes

- name: Ensure ipfs kubo image is pulled
  ansible.builtin.command: docker pull ipfs/kubo:latest
  become: yes
  register: docker_pull
  changed_when: "'Downloaded newer image' in docker_pull.stdout"

- name: Run ipfs job
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/ipfs.nomad
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  register: nomad_job_run

- name: Allow IPFS ports in UFW
  ansible.builtin.command: ufw allow {{ item }}/tcp
  loop:
    - "{{ ipfs_swarm_port | default(4001) }}"
    - "{{ ipfs_api_port | default(5001) }}"
    - "{{ ipfs_gateway_port | default(8080) }}"
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Wait for IPFS API to be ready
  ansible.builtin.wait_for:
    host: "{{ cluster_ip | default('127.0.0.1') }}"
    port: "{{ ipfs_api_port | default(5001) }}"
    delay: 5
    timeout: 300
    state: started
