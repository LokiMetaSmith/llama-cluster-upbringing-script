---
- name: Ensure influxdb data directory exists
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}/influxdb-data"
    state: directory
    mode: '0755'
  become: yes

- name: Check if influxdb job exists and get status
  ansible.builtin.shell: |
    set -o pipefail
    /usr/local/bin/nomad job status -json influxdb || echo '{"Status": "missing"}'
  args:
    executable: /bin/bash
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  register: influxdb_job_status
  failed_when: false
  changed_when: false
  become: no

- name: Extract job status
  ansible.builtin.set_fact:
    influxdb_job_state: "{{ (influxdb_job_status.stdout | default('{\"Status\": \"missing\"}', true) | from_json).get('Status', 'missing') }}"

- name: Purge influxdb job if in failed state
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job stop -purge influxdb
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  when: influxdb_job_state in ['dead', 'failed', 'progress_deadline']
  changed_when: true
  become: no

- name: Template influxdb Nomad job file
  ansible.builtin.template:
    src: influxdb.nomad.j2
    dest: "{{ nomad_jobs_dir }}/influxdb.nomad"
    mode: '0644'
  become: yes

- name: Allow InfluxDB port in UFW
  ansible.builtin.command: ufw allow {{ influxdb_port | default(8086) }}/tcp
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Run influxdb job asynchronously
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/influxdb.nomad
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  changed_when: true
  become: no
