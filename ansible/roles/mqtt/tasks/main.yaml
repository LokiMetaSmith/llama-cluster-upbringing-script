- name: Check if Nomad CLI cert exists
  ansible.builtin.stat:
    path: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem' }}"
  register: nomad_cli_cert_stat

- name: Set nomad_protocol fact
  ansible.builtin.set_fact:
    nomad_protocol: "{{ \"https\" if nomad_cli_cert_stat.stat.exists else \"http\" }}"

- name: Ensure Nomad volumes directory exists
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}"
    state: directory
    mode: '0755'
  become: yes

- name: Ensure Mosquitto directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "1883"
    group: "1883"
  become: yes
  loop:
    - "{{ nomad_volumes_dir }}/mqtt-data"
    - "{{ nomad_volumes_dir }}/mqtt-data/data"
    - "{{ nomad_volumes_dir }}/mqtt-data/log"
    - "{{ nomad_volumes_dir }}/mqtt-data/config"

- name: Flush handlers to ensure nomad is restarted and ready
  ansible.builtin.meta: flush_handlers

- name: Fetch Consul management token (if undefined)
  ansible.builtin.slurp:
    src: /etc/consul.d/management_token
  register: consul_token_file_mqtt
  delegate_to: "{{ (groups['controller_nodes'] | first) if ('controller_nodes' in groups and groups['controller_nodes']) else inventory_hostname }}"
  become: yes
  until: consul_token_file_mqtt is success
  retries: 5
  delay: 2
  when: consul_bootstrap_token is undefined
  ignore_errors: yes

- name: Set Consul token fact (if undefined)
  set_fact:
    consul_bootstrap_token: "{{ consul_token_file_mqtt['content'] | b64decode | trim }}"
  when: consul_bootstrap_token is undefined and consul_token_file_mqtt is success and consul_token_file_mqtt.content is defined

- name: Check Nomad Consul integration status
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad node status -self -json
  environment:
    NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
  register: nomad_status_json
  changed_when: false
  ignore_errors: yes

- name: Fix Nomad Consul integration if missing
  when: >
    nomad_status_json.stdout is defined and
    (nomad_status_json.stdout | trim | length > 0) and
    'consul.version' not in (nomad_status_json.stdout | default('{}', true) | from_json).get('Attributes', {})
  block:
    - name: Debug Consul Token
      ansible.builtin.debug:
        msg: "Consul token is: {{ 'DEFINED' if consul_bootstrap_token is defined and consul_bootstrap_token | length > 0 else 'UNDEFINED/EMPTY' }}"

    - name: Check server.hcl for token
      ansible.builtin.command: grep "token" /etc/nomad.d/server.hcl
      register: server_hcl_token
      become: yes
      ignore_errors: yes
      changed_when: false

    - name: Debug server.hcl token presence
      ansible.builtin.debug:
        var: server_hcl_token.stdout_lines

    - name: Verify Consul Leader Status
      ansible.builtin.uri:
        url: "https://{{ cluster_ip }}:{{ consul_https_port }}/v1/status/leader"
        client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
        client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
        ca_path: "/etc/consul.d/ca.pem"
        return_content: yes
      register: consul_leader_check
      ignore_errors: yes

    - name: Debug Consul Leader
      ansible.builtin.debug:
        var: consul_leader_check

    - name: Verify Consul Token Validity
      ansible.builtin.uri:
        url: "https://{{ cluster_ip }}:{{ consul_https_port }}/v1/agent/self"
        client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
        client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
        ca_path: "/etc/consul.d/ca.pem"
        headers:
          X-Consul-Token: "{{ consul_bootstrap_token | default('') }}"
        return_content: yes
      register: consul_token_check
      ignore_errors: yes

    - name: Debug Consul Token Check
      ansible.builtin.debug:
        var: consul_token_check

    - name: Fetch Nomad Logs (Pre-Restart)
      ansible.builtin.shell: "journalctl -u nomad -n 200 --no-pager | grep -i consul"
      register: nomad_logs_consul
      ignore_errors: yes
      become: yes

    - name: Display Nomad Consul Logs
      ansible.builtin.debug:
        var: nomad_logs_consul.stdout_lines

    - name: Force restart Nomad to pick up Consul config
      ansible.builtin.systemd:
        name: nomad
        state: restarted
      become: yes

    - name: Wait for Nomad API to be ready after restart
      ansible.builtin.uri:
        url: "https://{{ cluster_ip }}:{{ nomad_http_port }}/v1/agent/self"
        ca_path: "{{ nomad_tls_dir }}/ca.pem"
        status_code: 200
        client_cert: "{{ nomad_tls_dir }}/cli.cert.pem"
        client_key: "{{ nomad_tls_dir }}/cli.key.pem"
      register: nomad_api_status_fix
      until: nomad_api_status_fix.status == 200
      retries: 12
      delay: 5

- name: Check if mqtt job exists
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job status mqtt
  environment:
    NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
  register: mqtt_job_check
  failed_when: false
  changed_when: false

- name: Purge mqtt job
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job stop -purge mqtt
  environment:
    NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
    NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
  when: mqtt_job_check.rc == 0
  changed_when: true

- name: Template mosquitto.conf
  ansible.builtin.template:
    src: mosquitto.conf.j2
    dest: "{{ nomad_volumes_dir }}/mqtt-data/config/mosquitto.conf"
    mode: '0644'
    owner: "1883"
    group: "1883"
  become: yes

- name: Determine Controller Host
  ansible.builtin.set_fact:
    controller_host: "{{ (groups['controller_nodes'] | first) if ('controller_nodes' in groups and groups['controller_nodes']) else (groups['all'] | first) if ('all' in groups and groups['all']) else inventory_hostname }}"

- name: Check if Mosquitto image is cached on controller
  ansible.builtin.stat:
    path: /opt/mosquitto.tar
  register: mosquitto_cache_stat
  delegate_to: "{{ controller_host }}"
  run_once: true

- name: Load Mosquitto image from local cache on controller if available
  ansible.builtin.command:
    cmd: docker load -i /opt/mosquitto.tar
  become: yes
  when: mosquitto_cache_stat.stat.exists
  register: load_mosquitto_cache
  ignore_errors: yes
  delegate_to: "{{ controller_host }}"
  run_once: true

- name: Ensure Mosquitto image is pulled on controller
  ansible.builtin.command:
    cmd: "docker pull eclipse-mosquitto:2"
  become: yes
  register: docker_pull_mosquitto
  until: docker_pull_mosquitto is success
  retries: 5
  delay: 10
  when: not mosquitto_cache_stat.stat.exists or (load_mosquitto_cache is defined and load_mosquitto_cache is failed)
  changed_when: false
  delegate_to: "{{ controller_host }}"
  run_once: true

- name: Cache Mosquitto image to controller local tarball
  ansible.builtin.command:
    cmd: "docker save -o /opt/mosquitto.tar eclipse-mosquitto:2"
  become: yes
  when: not mosquitto_cache_stat.stat.exists or (load_mosquitto_cache is defined and load_mosquitto_cache is failed)
  delegate_to: "{{ controller_host }}"
  run_once: true

- name: Pin Mosquitto tarball to IPFS
  ansible.builtin.command:
    cmd: "ipfs add -Q /opt/mosquitto.tar"
  become: yes
  register: ipfs_add_result_mosquitto
  environment:
    IPFS_PATH: "{{ ipfs_path }}"
  changed_when: false
  delegate_to: "{{ controller_host }}"
  run_once: true

- name: Set mosquitto_ipfs_cid fact on controller
  ansible.builtin.set_fact:
    mosquitto_ipfs_cid: "{{ ipfs_add_result_mosquitto.stdout }}"
  delegate_to: "{{ controller_host }}"
  delegate_facts: yes
  run_once: true

- name: Set mosquitto_ipfs_cid fact on all hosts
  ansible.builtin.set_fact:
    mosquitto_ipfs_cid: "{{ hostvars[controller_host]['mosquitto_ipfs_cid'] }}"

- name: Template mqtt Nomad job file
  ansible.builtin.template:
    src: mqtt.nomad.j2
    dest: "{{ nomad_jobs_dir }}/mqtt.nomad"
  become: yes

- name: Wait for Nomad to be ready
  ansible.builtin.wait_for:
    host: "{{ cluster_ip }}"
    port: "{{ nomad_http_port }}"
    timeout: 60

- name: Ensure Mosquitto image is pulled/loaded locally
  ansible.builtin.shell: |
    {% raw %}
    if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "eclipse-mosquitto:2"; then
      echo "Image already present"
    elif [ -f /opt/mosquitto.tar ]; then
      docker load -i /opt/mosquitto.tar
    else
      docker pull eclipse-mosquitto:2
    fi
    {% endraw %}
  become: yes
  changed_when: false
  register: ensure_mosquitto_local
  until: ensure_mosquitto_local is success
  retries: 3
  delay: 5
  ignore_errors: yes

- name: Kill any process using MQTT ports (cleanup zombies)
  ansible.builtin.shell: "fuser -k {{ item }}/tcp || true"
  become: yes
  loop:
    - "{{ mqtt_port }}"
    - "{{ mqtt_websocket_port }}"
  changed_when: false
  ignore_errors: yes

- name: Remove any zombie Mosquitto containers
  ansible.builtin.shell: "docker ps -q --filter 'ancestor=eclipse-mosquitto:2' | xargs -r docker rm -f"
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Allow MQTT port in UFW
  ansible.builtin.command: ufw allow {{ mqtt_port }}/tcp
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Allow MQTT Websocket port in UFW
  ansible.builtin.command: ufw allow {{ mqtt_websocket_port }}/tcp
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Warm up IPFS gateway cache for Mosquitto tarball
  ansible.builtin.uri:
    url: "http://{{ cluster_ip }}:{{ ipfs_gateway_port | default(8080) }}/ipfs/{{ mosquitto_ipfs_cid }}"
    method: GET
    status_code: 200
  register: ipfs_warmup
  retries: 5
  delay: 3
  until: ipfs_warmup is success

- name: Deploy MQTT Job
  block:
    - name: Run mqtt job
      ansible.builtin.command:
        cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/mqtt.nomad
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      changed_when: true
      register: mqtt_job_run

    - name: Wait for MQTT service to be healthy in Consul
      ansible.builtin.uri:
        url: "https://{{ advertise_ip }}:{{ consul_https_port }}/v1/health/service/mqtt?passing"
        client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
        client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
        ca_path: "/etc/consul.d/ca.pem"
        method: GET
        headers:
          X-Consul-Token: "{{ consul_bootstrap_token | default('') }}"
        return_content: yes
        status_code: 200
      register: consul_check
      until: consul_check.json is defined and consul_check.json | length > 0
      retries: 30
      delay: 2
  rescue:
    - name: Get MQTT job status
      ansible.builtin.command:
        cmd: /usr/local/bin/nomad job status -verbose mqtt
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: mqtt_job_status
      ignore_errors: yes

    - name: Display MQTT job status
      ansible.builtin.debug:
        var: mqtt_job_status.stdout

    - name: Get Nomad Node Status (Debug)
      ansible.builtin.command:
        cmd: /usr/local/bin/nomad node status -self -verbose
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: nomad_node_status
      ignore_errors: yes

    - name: Display Nomad Node Status
      ansible.builtin.debug:
        var: nomad_node_status.stdout

    - name: Get MQTT allocations
      ansible.builtin.command:
        cmd: /usr/local/bin/nomad job allocs -json mqtt
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: mqtt_allocs
      ignore_errors: yes

    - name: Save MQTT allocations to temp file
      ansible.builtin.copy:
        content: "{{ mqtt_allocs.stdout }}"
        dest: "/opt/mqtt_allocs.json"

    - name: Extract Allocation ID
      ansible.builtin.command: jq -r 'sort_by(.CreateTime) | reverse | .[0].ID' /opt/mqtt_allocs.json
      register: mqtt_alloc_id
      ignore_errors: yes

    - name: Check mosquitto task state
      ansible.builtin.command: jq -r 'sort_by(.CreateTime) | reverse | .[0].TaskStates.mosquitto.State' /opt/mqtt_allocs.json
      register: mosquitto_task_state
      ignore_errors: yes

    - name: Fetch MQTT logs (stdout)
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad alloc logs -task mosquitto {{ mqtt_alloc_id.stdout }}"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: mqtt_logs_stdout
      ignore_errors: yes
      when: (mqtt_alloc_id.stdout | trim | length > 0) and (mqtt_alloc_id.stdout | trim != 'null') and (mosquitto_task_state.stdout | trim != 'pending')

    - name: Display MQTT logs (stdout)
      ansible.builtin.debug:
        var: mqtt_logs_stdout.stdout
      when: mqtt_logs_stdout.stdout is defined

    - name: Fetch MQTT logs (stderr)
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad alloc logs -stderr -task mosquitto {{ mqtt_alloc_id.stdout }}"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: mqtt_logs_stderr
      ignore_errors: yes
      when: (mqtt_alloc_id.stdout | trim | length > 0) and (mqtt_alloc_id.stdout | trim != 'null') and (mosquitto_task_state.stdout | trim != 'pending')

    - name: Display MQTT logs (stderr)
      ansible.builtin.debug:
        var: mqtt_logs_stderr.stdout
      when: mqtt_logs_stderr.stdout is defined

    - name: Clean up temp file
      ansible.builtin.file:
        path: "/opt/mqtt_allocs.json"
        state: absent

    - name: Fail after debugging
      ansible.builtin.fail:
        msg: "MQTT job failed to start. See logs above."

- name: Debug mqtt job run
  ansible.builtin.debug:
    var: mqtt_job_run
