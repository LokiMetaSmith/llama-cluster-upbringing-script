- name: Create Authentik parent directory
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}/authentik"
    state: directory
    mode: '0775'
    owner: "{{ target_user | default('pipecatapp') }}"
    group: "{{ target_user | default('pipecatapp') }}"
  become: yes

- name: Create Authentik non-database directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "1000"
    group: "1000"
  become: yes
  loop:
    - "{{ nomad_volumes_dir }}/authentik/media"
    - "{{ nomad_volumes_dir }}/authentik/templates"
    - "{{ nomad_volumes_dir }}/authentik/certs"

- name: Create Authentik postgres directory
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}/authentik/postgres"
    state: directory
    mode: '0700'
    owner: "70"
    group: "70"
  become: yes

- name: Fetch Consul management token (if undefined)
  ansible.builtin.slurp:
    src: /etc/consul.d/management_token
  register: consul_token_file_authentik
  delegate_to: "{{ (groups['controller_nodes'] | first) if ('controller_nodes' in groups and groups['controller_nodes']) else inventory_hostname }}"
  become: yes
  until: consul_token_file_authentik is success
  retries: 5
  delay: 2
  when: consul_bootstrap_token is undefined
  ignore_errors: yes

- name: Set Consul token fact (if undefined)
  ansible.builtin.set_fact:
    consul_bootstrap_token: "{{ consul_token_file_authentik['content'] | b64decode | trim }}"
  when: consul_bootstrap_token is undefined and consul_token_file_authentik is success and consul_token_file_authentik.content is defined

- name: Check if Authentik secret key exists in Consul
  ansible.builtin.uri:
    url: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ consul_https_port | default(8501) }}/v1/kv/authentik/secret-key"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: false
    method: GET
    headers:
      X-Consul-Token: "{{ consul_bootstrap_token | default(omit) }}"
    status_code: [200, 404]
  register: authentik_consul_key
  ignore_errors: yes

- name: Generate Authentik secret key
  ansible.builtin.command: openssl rand -hex 50
  register: authentik_generated_key
  when: >
    authentik_consul_key is not failed and
    (authentik_consul_key.status == 404 or
    (authentik_consul_key.status == 200 and authentik_consul_key.json[0].Value | default('') | b64decode | length < 50))

- name: Publish Authentik secret key to Consul
  ansible.builtin.uri:
    url: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ consul_https_port | default(8501) }}/v1/kv/authentik/secret-key"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: false
    method: PUT
    headers:
      X-Consul-Token: "{{ consul_bootstrap_token | default(omit) }}"
    body: "{{ authentik_generated_key.stdout }}"
    status_code: [200, 201]
  when: >
    authentik_consul_key is not failed and
    (authentik_consul_key.status == 404 or
    (authentik_consul_key.status == 200 and authentik_consul_key.json[0].Value | default('') | b64decode | length < 50))

- name: Check if Authentik DB password exists in Consul
  ansible.builtin.uri:
    url: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ consul_https_port | default(8501) }}/v1/kv/authentik/db-password"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: false
    method: GET
    headers:
      X-Consul-Token: "{{ consul_bootstrap_token | default(omit) }}"
    status_code: [200, 404]
  register: authentik_db_password_key
  ignore_errors: yes

- name: Generate Authentik DB password
  ansible.builtin.command: openssl rand -base64 32
  register: authentik_generated_db_password
  when: >
    authentik_db_password_key is not failed and
    (authentik_db_password_key.status == 404 or
    (authentik_db_password_key.status == 200 and authentik_db_password_key.json[0].Value | default('') | b64decode | length < 10))

- name: Publish Authentik DB password to Consul
  ansible.builtin.uri:
    url: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ consul_https_port | default(8501) }}/v1/kv/authentik/db-password"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: false
    method: PUT
    headers:
      X-Consul-Token: "{{ consul_bootstrap_token | default(omit) }}"
    body: "{{ authentik_generated_db_password.stdout }}"
    status_code: [200, 201]
  when: >
    authentik_db_password_key is not failed and
    (authentik_db_password_key.status == 404 or
    (authentik_db_password_key.status == 200 and authentik_db_password_key.json[0].Value | default('') | b64decode | length < 10))

- name: Template Authentik Nomad job
  ansible.builtin.template:
    src: authentik.nomad.j2
    dest: "{{ nomad_jobs_dir }}/authentik.nomad"
  become: yes

- name: Set postgres volume permissions
  ansible.builtin.shell: chown -R 70:70 "{{ nomad_volumes_dir }}/authentik/postgres" && chmod 700 "{{ nomad_volumes_dir }}/authentik/postgres"
  become: yes
  changed_when: false

- name: Check Authentik Nomad job status
  ansible.builtin.command: nomad job status authentik
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  register: authentik_job_status
  failed_when: false
  changed_when: false

- name: Purge stuck Authentik job
  ansible.builtin.command: nomad job stop -purge authentik
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  when: >
    authentik_job_status.rc == 0 and
    ('Status = dead' in authentik_job_status.stdout or
     'Status = failed' in authentik_job_status.stdout or
     'Failed due to progress deadline' in authentik_job_status.stdout)
  changed_when: true

- name: Run Authentik Nomad job
  ansible.builtin.command: nomad job run -detach {{ nomad_jobs_dir }}/authentik.nomad
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  register: authentik_deploy
  changed_when: "'modified' in authentik_deploy.stdout or 'created' in authentik_deploy.stdout"
