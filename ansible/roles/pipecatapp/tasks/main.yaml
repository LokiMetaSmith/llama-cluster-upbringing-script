# This block handles the Docker-based deployment
- name: Docker Deployment Block
  block:
    - name: Build pipecatapp Docker image
      community.docker.docker_image:
        name: pipecatapp:latest
        build:
          path: "{{ playbook_dir }}/docker/pipecatapp"
        source: build
        state: present
      become: yes
  when: pipecat_docker | default(false)

# This block handles the traditional raw_exec deployment
- name: Raw Exec Deployment Block
  block:
    - name: Install python3, pip, and venv system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes
        cache_valid_time: 3600
      become: yes

    - name: Install system dependencies for Python packages
      ansible.builtin.apt:
        name:
          - build-essential
          - python3-dev
          - portaudio19-dev
          - mecab
          - libmecab-dev
          - mecab-ipadic-utf8
          - rustc
          - cargo
        state: present
      become: yes

    - name: Install system dependencies for Playwright
      ansible.builtin.apt:
        name:
          - libevent-2.1-7t64
          - libgstreamer-plugins-bad1.0-0
          - libflite1
          - libavif16
          - gstreamer1.0-libav
        state: present
      become: yes

    - name: Create pipecatapp application directory
      ansible.builtin.file:
        path: /opt/pipecatapp
        state: directory
        mode: '0755'
      become: yes

    - name: Ensure correct ownership of the application directory
      ansible.builtin.file:
        path: /opt/pipecatapp
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        recurse: yes
      become: yes

    - name: Create a virtual environment for the pipecat app
      ansible.builtin.command:
        cmd: python3 -m venv /opt/pipecatapp/venv
        creates: /opt/pipecatapp/venv/bin/pip
      become: yes

    - name: Create a persistent temporary directory for pip builds
      ansible.builtin.file:
        path: /var/tmp/ansible_pip_build
        state: directory
        mode: '0777'
      become: yes

    - name: Copy requirements.txt to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/ansible/roles/python_deps/files/requirements.txt"
        dest: /opt/pipecatapp/requirements.txt
      become: yes

    - name: Configure git to use anonymous protocol for GitHub
      ansible.builtin.git_config:
        name: url.https://github.com/.insteadOf
        scope: system
        value: git://github.com/
      become: yes

    - name: Install/Upgrade base python packages in venv
      ansible.builtin.pip:
        name:
          - pip
          - setuptools
          - wheel
          - cython
        state: latest
        executable: /opt/pipecatapp/venv/bin/pip3
      become: yes

    - name: Install python dependencies into the virtual environment
      ansible.builtin.pip:
        requirements: /opt/pipecatapp/requirements.txt
        executable: /opt/pipecatapp/venv/bin/pip3
        extra_args: -v
      environment:
        TMPDIR: /var/tmp/ansible_pip_build
      become: yes
      async: 1200
      poll: 10

    - name: Clean up pip build directory
      ansible.builtin.file:
        path: /var/tmp/ansible_pip_build
        state: absent
      become: yes

    - name: Create pipecat configuration file
      ansible.builtin.template:
        src: pipecat_config.json.j2
        dest: /opt/pipecatapp/pipecat_config.json
        mode: '0644'
      become: yes

    - name: Copy application files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /opt/pipecatapp/
      with_items:
        - app.py
        - memory.py
        - web_server.py
        - moondream_detector.py
        - static
        - tools
        - prompts
      become: yes
      tags:
        - deploy_app

    - name: Copy pipecat startup script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/scripts/start_pipecat.sh"
        dest: /opt/pipecatapp/start_pipecat.sh
        mode: '0755'
      become: yes
      tags:
        - deploy_app

    - name: Install Playwright browsers
      ansible.builtin.command:
        cmd: /opt/pipecatapp/venv/bin/python3 -m playwright install
      become: yes
      async: 900
      poll: 10
  when: not pipecat_docker | default(false)

# Common tasks for both deployment methods
- name: Create model directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  with_items:
    - /opt/nomad/models/stt
    - /root/.cache/torch/hub/snakers4_silero-vad_master
  become: yes

- name: Clone required models
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    version: main
  with_items:
    - { repo: 'https://huggingface.co/Systran/faster-whisper-tiny.en', dest: '/opt/nomad/models/stt/faster-whisper-tiny.en' }
    - { repo: 'https://github.com/snakers4/silero-vad.git', dest: '/root/.cache/torch/hub/snakers4_silero-vad_master' }
  become: yes

- name: Set nomad job file variable
  ansible.builtin.set_fact:
    pipecat_nomad_job_file: "pipecatapp.{{ 'docker' if pipecat_docker|default(false) else 'raw_exec' }}.nomad"

- name: Copy pipecatapp Nomad job file
  ansible.builtin.template:
    src: "../../jobs/{{ pipecat_nomad_job_file }}"
    dest: "/opt/nomad/jobs/{{ pipecat_nomad_job_file }}"
  become: yes

- name: Install systemd service for starting Nomad jobs on boot
  ansible.builtin.template:
    src: prima-services.service.j2
    dest: /etc/systemd/system/prima-services.service
    mode: '0644'
  become: yes
  notify:
    - Reload systemd
    - Enable and start prima-services

- name: Wait for Nomad API to be ready
  ansible.builtin.uri:
    url: http://127.0.0.1:4646/v1/status/leader
    method: GET
    status_code: 200
  register: nomad_api_status
  until: nomad_api_status.status == 200
  retries: 12
  delay: 5

- name: Check if pipecat-app job is running
  ansible.builtin.command:
    cmd: nomad job status pipecat-app
  register: pipecat_job_status
  changed_when: false
  ignore_errors: true

- name: Run pipecat-app job
  ansible.builtin.command:
    cmd: "nomad job run /opt/nomad/jobs/{{ pipecat_nomad_job_file }}"
  when: pipecat_job_status.rc != 0

- name: Ensure start_services.sh is executable
  ansible.builtin.file:
    path: /opt/cluster-infra/start_services.sh
    mode: '0755'
    owner: root
    group: root
    state: file
  become: yes

- name: Flush handlers to ensure service is enabled and started
  ansible.builtin.meta: flush_handlers