- name: Check if Nomad CLI cert exists
  ansible.builtin.stat:
    path: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem' }}"
  register: nomad_cli_cert_stat

- name: Set nomad_protocol fact
  ansible.builtin.set_fact:
    nomad_protocol: "{{ \"https\" if nomad_cli_cert_stat.stat.exists else \"http\" }}"

- name: "Tool Server : Ensure tool_server directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  loop:
    - "/opt/tool_server"
    - "{{ cluster_infra_dir }}"
    - "{{ mcp_dir }}"
  become: true

- name: "Tool Server : Copy build files"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/tool_server/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  loop:
    - "app.py"
    - "Dockerfile"
    - "preload_models.py"
  become: true

- name: "Tool Server : Copy start_pipecat.sh"
  ansible.builtin.template:
    src: "{{ role_path }}/../pipecatapp/templates/start_pipecatapp.sh.j2"
    dest: "/home/pipecatapp/start_pipecat.sh"
    owner: pipecatapp
    group: pipecatapp
    mode: '0755'
  become: true

- name: "Tool Server : Copy entrypoint.sh"
  ansible.builtin.copy:
    src: "entrypoint.sh"
    dest: "/opt/tool_server/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  become: true

- name: "Tool Server : Copy pmm_memory.py"
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../pipecatapp/pmm_memory.py"
    dest: "/opt/tool_server/pmm_memory.py"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  become: true

- name: "Tool Server : Copy secret_manager.py"
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../pipecatapp/secret_manager.py"
    dest: "/opt/tool_server/secret_manager.py"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  become: true

- name: "Tool Server : Copy net_utils.py"
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../pipecatapp/net_utils.py"
    dest: "/opt/tool_server/net_utils.py"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0644"
  become: true

- name: "Tool Server : Copy tools directory"
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../pipecatapp/tools"
    dest: "/opt/tool_server/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  become: true

- name: Debug build context
  ansible.builtin.command: "ls -R {{ role_path }}"
  changed_when: false

- name: "Tool Server : Build tool-server docker image (cached)"
  ansible.builtin.include_tasks:
    file: "../../tasks/build_cached_image.yaml"
  vars:
    build_dir: "/opt/tool_server"
    image_name: "tool-server"
    image_tag: "local"

- name: Verify tool-server image exists
  ansible.builtin.command: docker image inspect tool-server:local
  become: yes
  changed_when: false

- name: Export tool-server image to tarball
  ansible.builtin.command: docker save -o /opt/tool-server.tar tool-server:local
  become: yes

- name: Pin tool-server tarball to IPFS
  ansible.builtin.command: ipfs add -Q /opt/tool-server.tar
  become: yes
  register: ipfs_add_result_tool
  environment:
    IPFS_PATH: "{{ unified_fs_mount_point | default('/opt/unified_fs') }}/ipfs"
- name: Clean up temporary tool-server tarball
  ansible.builtin.file:
    path: /opt/tool-server.tar
    state: absent
  become: yes

- name: Set tool_server_ipfs_cid fact
  ansible.builtin.set_fact:
    tool_server_ipfs_cid: "{{ ipfs_add_result_tool.stdout }}"

- name: "Tool Server : Verify Docker image exists"
  ansible.builtin.command:
    cmd: "docker images -q tool-server:local"
  register: docker_image_check
  failed_when: docker_image_check.stdout | length == 0
  changed_when: false
  become: true

- name: Template tool-server.nomad job file
  ansible.builtin.template:
    src: tool_server.nomad.j2
    dest: "{{ nomad_jobs_dir }}/tool_server.nomad"

- name: "Tool Server : Deploy Tool Server Job"
  block:
    - name: "Tool Server : Purge existing nomad job (force image update)"
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad job stop -purge tool-server"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      ignore_errors: yes
      failed_when: false
      changed_when: true
      become: no

    - name: "Tool Server : Run nomad job"
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/tool_server.nomad"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      changed_when: true
      become: no
      register: tool_server_job_run

  rescue:
    - name: "Tool Server : Get Tool Server job status"
      ansible.builtin.command:
        cmd: /usr/local/bin/nomad job status -verbose tool-server
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: ts_job_status
      ignore_errors: yes
      become: no

    - name: "Tool Server : Display Tool Server job status"
      ansible.builtin.debug:
        msg: "{{ ts_job_status.stdout | default('No stdout from job status') }}"

    - name: "Tool Server : Get Tool Server allocations"
      ansible.builtin.command:
        cmd: /usr/local/bin/nomad job allocs -json tool-server
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: ts_allocs
      ignore_errors: yes
      become: no

    - name: "Tool Server : Save Tool Server allocations to temp file"
      ansible.builtin.copy:
        content: "{{ ts_allocs.stdout | default('[]') }}"
        dest: "/opt/ts_allocs.json"

    - name: "Tool Server : Extract Allocation ID"
      ansible.builtin.command: jq -r 'sort_by(.CreateTime) | reverse | .[0].ID' /opt/ts_allocs.json
      register: ts_alloc_id
      ignore_errors: yes

    - name: "Tool Server : Fetch Tool Server logs (stdout)"
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad alloc logs -task tool-server-task {{ ts_alloc_id.stdout }}"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: ts_logs_stdout
      ignore_errors: yes
      become: no
      when: ts_alloc_id.stdout | default('') | length > 0

    - name: "Tool Server : Display Tool Server logs (stdout)"
      ansible.builtin.debug:
        msg: "{{ ts_logs_stdout.stdout }}"
      when: ts_logs_stdout is defined and 'stdout' in ts_logs_stdout

    - name: "Tool Server : Fetch Tool Server logs (stderr)"
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad alloc logs -stderr -task tool-server-task {{ ts_alloc_id.stdout }}"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: ts_logs_stderr
      ignore_errors: yes
      become: no
      when: ts_alloc_id.stdout | default('') | length > 0

    - name: "Tool Server : Display Tool Server logs (stderr)"
      ansible.builtin.debug:
        msg: "{{ ts_logs_stderr.stdout }}"
      when: ts_logs_stderr is defined and 'stdout' in ts_logs_stderr

    - name: "Tool Server : Get Allocation Status (Detailed)"
      ansible.builtin.command:
        cmd: "/usr/local/bin/nomad alloc status -verbose {{ ts_alloc_id.stdout }}"
      environment:
        NOMAD_ADDR: "{{ nomad_protocol | default('https') }}://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
        NOMAD_CACERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/ca.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_CERT: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.cert.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
        NOMAD_CLIENT_KEY: "{{ (nomad_tls_dir | default('/etc/nomad.d/tls') ~ '/cli.key.pem') if nomad_cli_cert_stat.stat.exists else omit }}"
      register: ts_alloc_status
      ignore_errors: yes
      become: no
      when: ts_alloc_id.stdout | default('') | length > 0

    - name: "Tool Server : Display Allocation Status"
      ansible.builtin.debug:
        msg: "{{ ts_alloc_status.stdout }}"
      when: ts_alloc_status is defined and 'stdout' in ts_alloc_status

    - name: "Tool Server : Clean up temp file"
      ansible.builtin.file:
        path: "/opt/ts_allocs.json"
        state: absent

    - name: "Tool Server : Fail after debugging"
      ansible.builtin.fail:
        msg: "Tool Server job failed to start. See logs above."
