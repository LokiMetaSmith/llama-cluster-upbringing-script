- name: Ensure Home Assistant config directory exists
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}/ha-config"
    state: directory
    owner: "568"
    group: "568"
    mode: '0775'
    recurse: yes
  become: yes

- name: Check if home-assistant job exists and get status
  ansible.builtin.shell: |
    set -o pipefail
    /usr/local/bin/nomad job status -json home-assistant || echo '{"Status": "missing"}'
  args:
    executable: /bin/bash
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  register: home_assistant_job_status
  failed_when: false
  changed_when: false
  become: no

- name: Extract job status
  ansible.builtin.set_fact:
    home_assistant_job_state: "{{ (home_assistant_job_status.stdout | from_json).Status | default('missing') }}"

- name: Purge home-assistant job if in failed state
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job stop -purge home-assistant
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  when: home_assistant_job_state in ['dead', 'failed', 'progress_deadline']
  changed_when: true
  become: no

- name: Template home-assistant Nomad job file
  ansible.builtin.template:
    src: home_assistant.nomad.j2
    dest: "{{ nomad_jobs_dir }}/home-assistant.nomad"
    mode: '0644'
  become: yes

- name: Template Home Assistant configuration
  ansible.builtin.template:
    src: configuration.yaml.j2
    dest: "{{ nomad_volumes_dir }}/ha-config/configuration.yaml"
    mode: '0644'
  become: yes

- name: Allow Home Assistant port in UFW
  ansible.builtin.command: ufw allow {{ home_assistant_port }}/tcp
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Wait for Nomad API to be ready before submitting job
  ansible.builtin.uri:
    url: "https://{{ cluster_ip }}:{{ nomad_http_port }}/v1/status/leader"
    validate_certs: no
    method: GET
    status_code: 200
    client_cert: "{{ nomad_tls_dir }}/cli.cert.pem"
    client_key: "{{ nomad_tls_dir }}/cli.key.pem"
  register: home_assistant_nomad_api_status
  until: home_assistant_nomad_api_status.status is defined and home_assistant_nomad_api_status.status == 200
  retries: 12 # ~1 minute
  delay: 5
  changed_when: false
  become: no # Should be accessible locally

- name: Fetch Consul management token
  ansible.builtin.slurp:
    src: /etc/consul.d/management_token
  register: home_assistant_consul_token
  become: yes

- name: Debug Consul token
  ansible.builtin.debug:
    msg: "Token length: {{ (home_assistant_consul_token.content | b64decode | trim) | length }}"
  when: home_assistant_consul_token.content is defined

- name: Wait for MQTT service to be healthy in Consul before running home-assistant
  ansible.builtin.uri:
    url: "https://{{ cluster_ip }}:{{ consul_https_port }}/v1/health/service/mqtt?passing"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: false
    method: GET
    headers:
      X-Consul-Token: "{{ consul_bootstrap_token | default('') }}"
    return_content: yes
    status_code: 200
  register: mqtt_consul_check
  until: mqtt_consul_check.json is defined and mqtt_consul_check.json | length > 0
  retries: 30
  delay: 2

- name: Run home-assistant job asynchronously
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/home-assistant.nomad
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  changed_when: true
  become: no # Run nomad client as the ansible user
  async: 300
  poll: 0
  register: home_assistant_ha_job_run_status

- name: Log job submission status
  ansible.builtin.debug:
    var: home_assistant_ha_job_run_status
