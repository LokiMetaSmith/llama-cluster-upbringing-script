---
- name: Install NFS Server packages on controllers
  ansible.builtin.apt:
    name:
      - nfs-kernel-server
      - nfs-common
    state: present
  when: inventory_hostname in groups['controller_nodes']
  become: yes

- name: Install NFS Client packages on workers
  ansible.builtin.apt:
    name: nfs-common
    state: present
  when: inventory_hostname not in groups['controller_nodes']
  become: yes

- name: Create NFS backend directory on controllers
  ansible.builtin.file:
    path: /opt/unified_fs_backend
    state: directory
    mode: '0777'
    owner: root
    group: root
  when: inventory_hostname in groups['controller_nodes']
  become: yes

- name: Configure /etc/exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    mode: '0644'
  notify: restart nfs
  when: inventory_hostname in groups['controller_nodes']
  become: yes

- name: Start NFS Service on controllers
  ansible.builtin.systemd:
    name: nfs-kernel-server
    state: started
    enabled: yes
  when:
    - inventory_hostname in groups['controller_nodes']
    - not ansible_check_mode
  become: yes

- name: Flush handlers to apply NFS export settings immediately
  ansible.builtin.meta: flush_handlers

- name: Create client mount point directory
  ansible.builtin.file:
    path: /opt/unified_fs_backend
    state: directory
    mode: '0777'
  become: yes
  when: inventory_hostname not in groups['controller_nodes']

- name: Mount NFS Share on all hosts
  ansible.posix.mount:
    path: /opt/unified_fs_backend
    src: "{{ hostvars[groups['controller_nodes'][0]]['cluster_ip'] | default('127.0.0.1') }}:/opt/unified_fs_backend"
    fstype: nfs
    opts: "noatime,nodiratime,rsize=32768,wsize=32768,tcp,timeo=15,retrans=2,async,_netdev,bg"
    state: mounted
  become: yes
  when:
    - inventory_hostname not in groups['controller_nodes']
    - not ansible_check_mode

- name: Configure daily 2:00 AM automated backup cron job on controllers
  ansible.builtin.cron:
    name: "Daily Btrfs unified storage backup"
    minute: "0"
    hour: "2"
    job: "/usr/bin/python3 /opt/cluster-infra/scripts/recover_os.py --create >/dev/null 2>&1"
    user: "root"
  when: inventory_hostname in groups['controller_nodes']
  become: yes
