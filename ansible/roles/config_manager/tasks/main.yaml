# tasks file for ansible/roles/config_manager/tasks/main.yaml

- name: Read Consul management token
  ansible.builtin.slurp:
    src: "{{ consul_config_dir | default('/etc/consul.d') }}/management_token"
  register: consul_token_file
  become: yes
  ignore_errors: yes

- name: Set consul_token fact
  ansible.builtin.set_fact:
    consul_token: "{{ consul_token_file.content | b64decode | trim }}"
  when: consul_token_file.content is defined

- name: Populate Consul KV with Model Configurations
  ansible.builtin.uri:
    url: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ consul_https_port }}/v1/kv/config/models/{{ item.key }}"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: yes
    ca_path: "{{ consul_config_dir | default('/etc/consul.d') }}/ca.pem"
    method: PUT
    body: "{{ item.value | to_json }}"
    status_code: 200
    headers:
      X-Consul-Token: "{{ consul_token | default('') }}"
  loop: >
    {{
      (expert_models | dict2items) +
      [
        { 'key': 'vllm_expert_models', 'value': vllm_expert_models },
        { 'key': 'tts_voices', 'value': tts_voices },
        { 'key': 'piper_voice_files', 'value': piper_voice_files },
        { 'key': 'embedding_models', 'value': embedding_models },
        { 'key': 'stt_models', 'value': stt_models },
        { 'key': 'vision_models', 'value': vision_models }
      ]
    }}
  loop_control:
    label: "{{ item.key }}"

- name: Populate Consul KV with App Settings
  ansible.builtin.uri:
    url: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ consul_https_port }}/v1/kv/config/app/settings"
    client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
    client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
    validate_certs: yes
    ca_path: "{{ consul_config_dir | default('/etc/consul.d') }}/ca.pem"
    method: PUT
    body: >
      {{
        {
          "llama_api_service_name": llama_api_service_name,
          "use_summarizer": use_summarizer,
          "stt_service": stt_service,
          "pipecat_app_dir": pipecat_app_dir,
          "pipecat_log_file": pipecat_log_file,
          "active_stt_provider": active_stt_provider,
          "active_stt_model_name": active_stt_model_name,
          "pipecat_api_keys": pipecat_api_keys,
          "external_experts_config": external_experts_config,
          "openai_api_key": openai_api_key,
          "advertise_ip": advertise_ip,
          "nomad_models_dir": nomad_models_dir,
          "expected_cluster_size": expected_cluster_size,
          "audio_in_device_index": 0,
          "tool_execution_mode": "{{ tool_execution_mode | default('local') }}",
          "tool_server_url": "{{ tool_server_url | default('') }}",
          "tool_server_api_key": "{{ tool_server_api_key | default('') }}"
        } | to_json
      }}
    status_code: 200
    headers:
      X-Consul-Token: "{{ consul_token | default('') }}"
