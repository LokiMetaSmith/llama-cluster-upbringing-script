- name: Install common command-line tools
  ansible.builtin.apt:
    name:
      - mosh
      - tmux
      - htop
      - ncdu
      - sysbench
      - fio
      - iperf3
      - ufw
      - figlet
      - lolcat
      - age
    state: present
  become: yes

- name: Download SOPS binary
  ansible.builtin.get_url:
    url: https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
    dest: /usr/local/bin/sops
    mode: '0755'
  become: yes

- name: Ensure Mosh is allowed through the firewall
  ansible.builtin.ufw:
    rule: allow
    port: '60000:61000'
    proto: udp
  become: yes

- name: Import GitHub SSH keys for specified users
  ansible.builtin.command: ssh-import-id "gh:{{ item }}"
  loop: "{{ github_ssh_users }}"
  when: github_ssh_users | length > 0
  become: yes
  become_user: "{{ target_user }}"
