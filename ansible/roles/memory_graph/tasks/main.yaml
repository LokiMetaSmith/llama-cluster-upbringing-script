- name: Ensure memory persistence directory exists
  file:
    path: /opt/pipecat/data/memory
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Build memory-graph service image
  community.docker.docker_image:
    name: "memory-graph-service:local"
    build:
      path: "{{ inventory_dir }}/pipecatapp/memory_graph_service"
      pull: yes
    source: build
    force_source: true

- name: Export memory-graph-service image to tarball
  ansible.builtin.command: docker save -o /tmp/memory-graph-service.tar memory-graph-service:local
  become: yes

- name: Pin memory-graph-service tarball to IPFS
  ansible.builtin.command: ipfs add -Q /tmp/memory-graph-service.tar
  become: yes
  register: ipfs_add_result_memory_graph
  environment:
    IPFS_PATH: "{{ nomad_volumes_dir | default('/opt/cluster-infra/data') }}/ipfs"

- name: Clean up temporary memory-graph-service tarball
  ansible.builtin.file:
    path: /tmp/memory-graph-service.tar
    state: absent
  become: yes

- name: Set memory_graph_ipfs_cid fact
  ansible.builtin.set_fact:
    memory_graph_ipfs_cid: "{{ ipfs_add_result_memory_graph.stdout }}"

- name: Set memory_graph_image
  ansible.builtin.set_fact:
    memory_graph_image: "memory-graph-service:local"

- name: Ensure memory-graph.nomad job file exists
  ansible.builtin.template:
    src: memory-graph.nomad.j2
    dest: "{{ nomad_jobs_dir | default('/opt/nomad/jobs') }}/memory-graph.nomad"

- name: Deploy memory-graph Nomad job
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir | default('/opt/nomad/jobs') }}/memory-graph.nomad
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') }}/ca.pem"
    NOMAD_CLIENT_CERT: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') }}/cli.cert.pem"
    NOMAD_CLIENT_KEY: "{{ nomad_tls_dir | default('/etc/nomad.d/tls') }}/cli.key.pem"
    NOMAD_TLS_SKIP_VERIFY: "1"
  register: nomad_job_run
  changed_when: "'Job registration successful' in nomad_job_run.stdout or 'modified' in nomad_job_run.stdout"
