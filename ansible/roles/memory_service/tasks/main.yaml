- name: Create memory service build directory
  ansible.builtin.file:
    path: /opt/memory_service/build
    state: directory
    mode: '0755'

- name: Copy memory service source files to build directory
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/memory_service/build/{{ item }}"
    mode: '0644'
  loop:
    - app.py
    - pmm_memory.py

- name: Copy Dockerfile to build directory
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../docker/memory_service/Dockerfile"
    dest: "/opt/memory_service/build/Dockerfile"
    mode: '0644'

- name: Build memory_service Docker image
  community.docker.docker_image:
    name: memory_service
    tag: local
    build:
      path: "/opt/memory_service/build"
      nocache: true
    source: build
    force_source: true

- name: Export memory_service image to tarball
  ansible.builtin.command: docker save -o /opt/memory_service.tar memory_service:local
  become: yes

- name: Pin memory_service tarball to IPFS
  ansible.builtin.command: ipfs add -Q /opt/memory_service.tar
  become: yes
  register: ipfs_add_result_memory
  environment:
    IPFS_PATH: "{{ unified_fs_mount_point | default('/opt/unified_fs') }}/ipfs"

- name: Clean up temporary memory_service tarball
  ansible.builtin.file:
    path: /opt/memory_service.tar
    state: absent
  become: yes

- name: Set memory_service_ipfs_cid fact
  ansible.builtin.set_fact:
    memory_service_ipfs_cid: "{{ ipfs_add_result_memory.stdout }}"

- name: Template memory service Nomad job
  ansible.builtin.template:
    src: memory_service.nomad.j2
    dest: /opt/nomad/jobs/memory_service.nomad
    mode: '0644'
  notify: Run memory service job
