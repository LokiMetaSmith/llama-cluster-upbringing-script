---
- name: Ensure zigbee2mqtt data directory exists
  ansible.builtin.file:
    path: "{{ nomad_volumes_dir }}/zigbee2mqtt-data"
    state: directory
    mode: '0755'
  become: yes

- name: Check if zigbee2mqtt job exists and get status
  ansible.builtin.shell: |
    set -o pipefail
    /usr/local/bin/nomad job status -json zigbee2mqtt || echo '{"Status": "missing"}'
  args:
    executable: /bin/bash
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  register: zigbee2mqtt_job_status
  failed_when: false
  changed_when: false
  become: no

- name: Extract job status
  ansible.builtin.set_fact:
    zigbee2mqtt_job_state: "{{ (zigbee2mqtt_job_status.stdout | default('{\"Status\": \"missing\"}', true) | from_json).get('Status', 'missing') }}"

- name: Purge zigbee2mqtt job if in failed state
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job stop -purge zigbee2mqtt
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  when: zigbee2mqtt_job_state in ['dead', 'failed', 'progress_deadline']
  changed_when: true
  become: no

- name: Template zigbee2mqtt Nomad job file
  ansible.builtin.template:
    src: zigbee2mqtt.nomad.j2
    dest: "{{ nomad_jobs_dir }}/zigbee2mqtt.nomad"
    mode: '0644'
  become: yes

- name: Allow Zigbee2MQTT port in UFW
  ansible.builtin.command: ufw allow {{ zigbee2mqtt_port | default(8080) }}/tcp
  become: yes
  changed_when: false
  ignore_errors: yes

- name: Run zigbee2mqtt job asynchronously
  ansible.builtin.command:
    cmd: /usr/local/bin/nomad job run -detach {{ nomad_jobs_dir }}/zigbee2mqtt.nomad
  environment:
    NOMAD_ADDR: "https://{{ cluster_ip | default('127.0.0.1') }}:{{ nomad_http_port | default(4646) }}"
    NOMAD_CACERT: "/etc/nomad.d/tls/ca.pem"
    NOMAD_CLIENT_CERT: "/etc/nomad.d/tls/cli.cert.pem"
    NOMAD_CLIENT_KEY: "/etc/nomad.d/tls/cli.key.pem"
  changed_when: true
  become: no
