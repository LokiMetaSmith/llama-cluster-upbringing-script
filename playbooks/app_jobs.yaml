- hosts: all
  remote_user: "{{ target_user }}"
  become: yes

  tags:
    - app-jobs

  # This playbook runs Nomad jobs after core infrastructure is fully provisioned.
  # It should be run AFTER core_infra.yaml and after Nomad/Consul are running.
  #
  # Usage:
  #   ansible-playbook playbooks/app_jobs.yaml
  #
  # Or run via bootstrap.sh which will call this after core_infra:
  #   ./bootstrap.sh --role controller

  pre_tasks:
    - name: Ensure tailscale0 is available
      ansible.builtin.assert:
        that:
          - "'tailscale0' in ansible_facts['interfaces']"
          - "ansible_facts['tailscale0'].ipv4.address.startswith('100.')"
        fail_msg: "CRITICAL: tailscale0 interface is missing or has no 100.x.x.x IP. Cluster communication requires the mesh network."

    - name: Wait for Nomad to be ready
      ansible.builtin.wait_for:
        host: "{{ cluster_ip }}"
        port: "{{ nomad_http_port | default(4646) }}"
        timeout: 30
      tags:
        - wait

    - name: Wait for Consul to be ready
      ansible.builtin.wait_for:
        host: "{{ cluster_ip }}"
        port: "{{ consul_http_port | default(8500) }}"
        timeout: 30
      tags:
        - wait

  roles:
    - role: traefik
      tags:
        - traefik
        - proxy
    - role: authentik
      tags:
        - authentik
        - auth
