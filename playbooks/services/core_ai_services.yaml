- name: Deploy Core AI Services and Applications
  hosts: controller_nodes[0]:&hw_tier_high,controller_nodes[0]:&hw_tier_mid
  connection: local
  gather_facts: yes

  vars_files:
    - "../../group_vars/models.yaml"
    - "../../group_vars/external_experts.yaml"

  tags:
    - core-ai-services

  roles:
    - role: bootstrap_agent
      tags:
        - bootstrap_agent
    - role: term_everything
      tags:
        - term_everything
    - role: opencode
      tags:
        - opencode
    - role: gemini_cli
      tags:
        - gemini_cli
    - role: memory_service
      tags:
        - memory_service
    - role: memory_graph
      tags:
        - memory_graph
    - role: polyphony
      tags:
        - polyphony
    - role: pipecatapp
      tags:
        - pipecatapp
    - role: opengravity
      tags:
        - opengravity
    - role: tml_interaction
      tags:
        - tml_interaction
        - interaction_models
