- name: Deploy Application Services
  hosts: all
  remote_user: "{{ target_user }}"
  become: yes

  tags:
    - app-services

  tasks:
    - name: Flush handlers to ensure Nomad is restarted with new config
      ansible.builtin.meta: flush_handlers
      tags:
        - always

    - name: Wait for a Consul leader to be elected
      ansible.builtin.uri:
        url: "https://{{ cluster_ip }}:{{ consul_https_port | default(8501) }}/v1/status/leader"
        client_cert: "{{ consul_client_cert_path | default('/etc/consul.d/cert.pem') }}"
        client_key: "{{ consul_client_key_path | default('/etc/consul.d/key.pem') }}"
        ca_path: "/etc/consul.d/ca.pem"
        return_content: yes
      register: consul_leader_status
      until: consul_leader_status.status is defined and consul_leader_status.status == 200 and consul_leader_status.content is defined and consul_leader_status.content != '""'
      retries: 12
      delay: 5
      ignore_errors: yes
      tags:
        - consul

    - name: Fail gracefully if no Consul leader is found
      ansible.builtin.fail:
        msg: |
          The Consul service is running, but it has not elected a leader after 60 seconds.
          This usually means the `bootstrap_expect` value in your Consul configuration is
          higher than the number of server nodes available.
      when: consul_leader_status.skipped is not defined and (consul_leader_status.failed or consul_leader_status.content == '""')
      tags:
        - consul

    - name: Install system dependencies
      ansible.builtin.include_role:
        name: system_deps
      tags:
        - system_deps
        - deploy_app

    - name: Install all python dependencies
      ansible.builtin.include_role:
        name: python_deps
      tags:
        - python_deps
        - deploy_app

    - name: Deploy MQTT
      tags:
        - mqtt
      block:
        - name: Run mqtt role
          ansible.builtin.include_role:
            name: mqtt
      when: enable_mqtt | default(true)

    - name: Deploy Zigbee2MQTT
      tags:
        - zigbee2mqtt
      block:
        - name: Run zigbee2mqtt role
          ansible.builtin.include_role:
            name: zigbee2mqtt
      when: enable_zigbee2mqtt | default(true)

    - name: Run Provisioning API
      ansible.builtin.include_role:
        name: provisioning_api
      when: enable_provisioning_api | default(true)
      tags:
        - provisioning_api

    - name: Run Vision Role
      ansible.builtin.include_role:
        name: vision
      when: enable_frigate | default(false)
      tags:
        - vision

    - name: Deploy InfluxDB
      tags:
        - influxdb
      block:
        - name: Run influxdb role
          ansible.builtin.include_role:
            name: influxdb
      when: enable_influxdb | default(true)

    - name: Deploy Telegraf
      tags:
        - telegraf
      block:
        - name: Run telegraf role
          ansible.builtin.include_role:
            name: telegraf
      when: enable_telegraf | default(true)

    - name: Run application roles
      ansible.builtin.include_role:
        name: "{{ role_name }}"
      loop:
        - desktop_extras
        - power_manager
        - world_model_service
        - term_everything
        - tool_server
        - llxprt_code
        - claude_clone
        - moe_gateway
        - mcp_server
        - llmfit
        - openclaw
        - forgejo
        - paperless
        - opengist
        - e2a
        - traceway
      loop_control:
        loop_var: role_name
      tags:
        - provisioning_api
        - desktop_extras
        - power_manager
        - world_model_service
        - tool_server
        - forgejo
        - paperless
        - opengist
        - e2a
        - traceway

    - name: Run Paddler Stack
      when: enable_paddler | default(false)
      tags:
        - paddler
      block:
        - name: Install Paddler Binary
          ansible.builtin.include_role:
            name: paddler

        - name: Configure Paddler Balancer
          ansible.builtin.include_role:
            name: paddler_balancer
          when: inventory_hostname == (paddler_balancer_host | default('controller_node'))

        - name: Configure Paddler Agent
          ansible.builtin.include_role:
            name: paddler_agent
