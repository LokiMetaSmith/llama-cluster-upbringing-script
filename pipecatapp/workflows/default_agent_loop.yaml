name: "Agent Loop with Tools"
nodes:
  - id: "Input"
    type: "InputNode"
    config:
      outputs:
        - name: "user_text"
        - name: "tools_dict"
        - name: "tool_result"
    inputs: []

  - id: "SystemPrompt"
    type: "SystemPromptNode"
    inputs:
      - name: "tools"
        connection:
          from_node: "Input"
          from_output: "tools_dict"

  - id: "Router"
    type: "SimpleLLMNode"
    config:
      stream: false
      model: "gemma"
      fallback_models: ["olmo"]
      retry_on_403: true
      timeout: 60
    model_tier: "balanced"
    inputs:
      - name: "user_text"
        connection:
          from_node: "Input"
          from_output: "user_text"
      - name: "system_prompt"
        connection:
          from_node: "SystemPrompt"
          from_output: "system_prompt"
      - name: "tool_result"
        connection:
          from_node: "Input"
          from_output: "tool_result"

  - id: "ToolParser"
    type: "ToolParserNode"
    inputs:
      - name: "llm_response"
        connection:
          from_node: "Router"
          from_output: "response"

  - id: "ToolExecutor"
    type: "ToolExecutorNode"
    inputs:
      - name: "tool_call_data"
        connection:
          from_node: "ToolParser"
          from_output: "tool_call_data"
      - name: "tools_dict"
        connection:
          from_node: "Input"
          from_output: "tools_dict"

  - id: "Output"
    type: "OutputNode"
    inputs:
      - name: "final_response"
        connection:
          from_node: "ToolParser"
          from_output: "final_response"
      - name: "tool_call"
        connection:
          from_node: "ToolParser"
          from_output: "tool_call_data"
      - name: "tool_result"
        connection:
          from_node: "ToolExecutor"
          from_output: "tool_result"
