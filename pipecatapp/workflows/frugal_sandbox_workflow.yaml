name: "Frugal Sandbox and Escalation Workflow"
nodes:
  - id: "Input"
    type: "InputNode"
    config:
      outputs:
        - name: "user_text"
        - name: "tool_result"
        - name: "tools_dict"
    inputs: []

  - id: "SystemPrompt"
    type: "SystemPromptNode"
    inputs:
      - name: "custom_prompt"
        value: |
          You are a Frugal Sandboxing and Resource Governance Agent.
          Your task is to take a user's query and a proposed python script, run it securely in the 'frugal_sandbox' tool, and present the resulting performance scores (Value Density Ratio, physical RSS memory, duration) to evaluate if we should accept the low-weight output or escalate the execution to a high-capacity frontier expert.

          INSTRUCTIONS:
          1. Extract the `task_query` and the `proposed_code` from the user's instructions.
          2. Execute the `frugal_sandbox` tool with the extracted parameters.
          3. Print out a structured breakdown of:
             - Resource metrics (CPU duration, peak RSS memory).
             - Evaluation scores (Cost, Contribution value, and Value Density Ratio).
             - The escalation decision and the logical reasoning behind it.

          Do not ask for confirmation. Use the 'frugal_sandbox' tool to execute.

  - id: "FrugalSandboxReasoning"
    type: "SimpleLLMNode"
    config:
      stream: false
    model_tier: "fast"
    inputs:
      - name: "user_text"
        connection:
          from_node: "Input"
          from_output: "user_text"
      - name: "tool_result"
        connection:
          from_node: "Input"
          from_output: "tool_result"
      - name: "system_prompt"
        connection:
          from_node: "SystemPrompt"
          from_output: "system_prompt"

  - id: "ToolParser"
    type: "ToolParserNode"
    inputs:
      - name: "llm_response"
        connection:
          from_node: "FrugalSandboxReasoning"
          from_output: "response"

  - id: "ToolExecutor"
    type: "ToolExecutorNode"
    inputs:
      - name: "tool_call_data"
        connection:
          from_node: "ToolParser"
          from_output: "tool_call_data"
      - name: "tools_dict"
        connection:
          from_node: "Input"
          from_output: "tools_dict"

  - id: "Output"
    type: "OutputNode"
    inputs:
      - name: "final_response"
        connection:
          from_node: "ToolParser"
          from_output: "final_response"
      - name: "tool_call"
        connection:
          from_node: "ToolParser"
          from_output: "tool_call_data"
      - name: "tool_result"
        connection:
          from_node: "ToolExecutor"
          from_output: "tool_result"
