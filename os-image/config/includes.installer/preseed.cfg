# Default Locale and Keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string pipecat
d-i netcfg/get_domain string local

# Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Account setup
d-i passwd/root-login boolean false
d-i passwd/user-fullname string PipecatApp
d-i passwd/username string pipecatapp
d-i passwd/user-password password pipecat
d-i passwd/user-password-again password pipecat
d-i user-setup/allow-password-weak boolean true

# Clock and time zone setup
d-i clock-setup/utc boolean true
d-i time/zone string UTC

# Dynamic Disk Partitioning: Select the first available disk that is NOT the installation media
d-i partman/early_command string \
    USBDEV=$(list-devices usb-partition | sed 's/[0-9]*$//' | head -n1); \
    if [ -z "$USBDEV" ]; then \
        USBDEV=$(mount | grep "cdrom" | cut -d' ' -f1 | sed 's/[0-9]*$//'); \
    fi; \
    for dev in /dev/nvme0n1 /dev/sda /dev/sdb /dev/vda /dev/xvda; do \
        if [ -b "$dev" ] && [ "$dev" != "$USBDEV" ]; then \
            debconf-set partman-auto/disk "$dev"; \
            echo "d-i grub-installer/bootdev string $dev" | debconf-set-selections; \
            break; \
        fi; \
    done

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Base system installation
d-i base-installer/install-recommends boolean false

# Apt setup
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/use_mirror boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

# Package selection
tasksel tasksel/first multiselect ssh-server
d-i pkgsel/include string sudo curl git python3 openssh-server
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# Boot loader installation
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

# Late command: disable password authentication and enable passwordless sudo
d-i preseed/late_command string \
    in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config; \
    echo "pipecatapp ALL=(ALL) NOPASSWD: ALL" > /target/etc/sudoers.d/pipecatapp; \
    chmod 0440 /target/etc/sudoers.d/pipecatapp

# Finish installation
d-i finish-install/reboot_in_progress note
